<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Upload Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="dark">
    <div class="app">
      <header class="header">
        <div class="header-left">
          <div class="logo-mark">▲</div>
          <div>
            <h1 class="app-title">Content Tracker</h1>
            <p class="app-sub">IG · YT · LI · TW log</p>
          </div>
        </div>
        <div class="header-controls">
          <button class="icon-btn" id="historyToggle" title="View History">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </button>
          <button class="icon-btn" id="viewToggle" title="Toggle view layout">
            <span id="viewIcon">⊞</span>
          </button>
          <button class="icon-btn" id="themeToggle" title="Toggle theme">
            <span id="themeIcon">☀</span>
          </button>
          <button id="open-tab-btn" class="icon-button" title="Open in new tab">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
              ></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
          </button>
        </div>
      </header>

      <div class="today-bar" id="todayBar">
        <div class="today-title">TODAY'S UPLOADS</div>
        <div class="today-stats">
          <span class="stat-pill ig"><span id="today-ig">0</span> IG</span>
          <span class="stat-pill yt"><span id="today-yt">0</span> YT</span>
          <span class="stat-pill li"><span id="today-li">0</span> LI</span>
          <span class="stat-pill tw"><span id="today-tw">0</span> TW</span>
        </div>
      </div>

      <div class="input-zone" id="inputZone">
        <div class="input-wrapper">
          <input
            type="text"
            id="contentInput"
            class="content-input"
            placeholder="Add content title and press Enter…"
            autocomplete="off"
          />
          <span class="input-hint">↵</span>
        </div>
      </div>

      <div class="stats-bar" id="mainStatsBar">
        <span class="stat"><span id="totalCount">0</span> entries</span>
        <span class="stat-div">·</span>
        <span class="stat"><span id="doneCount">0</span> completed</span>
        <span class="stat-div">·</span>
        <span class="stat page-info"
          >Page <span id="currentPage">1</span> /
          <span id="totalPages">1</span></span
        >
      </div>

      <div class="entries-container" id="entriesContainer">
        <div class="col" id="colLeft"></div>
        <div class="col-divider"></div>
        <div class="col" id="colRight"></div>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <p>No content yet.<br />Type above and hit Enter.</p>
      </div>

      <div class="pagination" id="pagination">
        <button class="page-btn" id="prevBtn" disabled>‹ Prev</button>
        <div class="page-dots" id="pageDots"></div>
        <button class="page-btn" id="nextBtn">Next ›</button>
      </div>

      <div class="history-container" id="historyContainer">
        <div class="history-header">
          <h2>Archive</h2>
        </div>

        <div class="history-controls">
          <div class="history-tabs">
            <button class="hist-tab active" id="tabStats">Stats</button>
            <button class="hist-tab" id="tabList">Captions</button>
          </div>
          <div class="history-search-wrapper">
            <input
              type="text"
              id="historySearch"
              class="history-search"
              placeholder="Search archives..."
              autocomplete="off"
            />
          </div>
        </div>

        <div class="history-list" id="historyList"></div>
        <div class="history-pagination" id="historyPagination">
          <button class="page-btn" id="histPrevBtn" disabled>‹ Prev</button>
          <span class="history-page-info" id="histPageInfo">Page 1 / 1</span>
          <button class="page-btn" id="histNextBtn">Next ›</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
